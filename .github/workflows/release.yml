name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-desktop:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync Version
        run: node scripts/sync-version.js ${{ github.ref_name }}

      - name: Build Frontend
        run: pnpm run build:client

      - name: Build All Desktop Platforms
        run: |
          go install github.com/tc-hib/go-winres@latest
          pnpm run build:go

      - name: Upload Desktop Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: FastSend-Desktop
          path: out/FastSend_v*

  create-release:
    needs: [build-desktop]
    runs-on: ubuntu-latest
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts

      - name: Flatten and Prepare Files
        run: |
          mkdir -p out
          find all-artifacts -type f -exec cp {} out/ \;
          ls -R out

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            out/FastSend_v*
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
